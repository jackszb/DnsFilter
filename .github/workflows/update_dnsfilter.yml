name: Update DnsFilter

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install sing-box
        run: curl -fsSL https://sing-box.app/install.sh | sh

      - name: Download DnsFilter list
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/AdguardTeam/HostlistsRegistry/main/filters/general/filter_1_DnsFilter/filter.txt \
            -o DnsFilter.txt

      - name: Extract wildcard and suffix
        run: |
          set -e
          grep '^||' DnsFilter.txt | grep -vE '^(@@|^/)' | sed 's/^||//' | sed 's/\^.*$//' \
            | grep -vE '^([0-9]{1,3}\.){1,4}([0-9]{1,3})?$' \
            | grep -vE '^([0-9]{1,3}\.){1,3}[0-9]{1,3}(\.\*)?(\.gif)?$' \
            | grep -vE '([^.]\.\.)' | sort -u | \
            tee >(grep '\*' > wildcard.txt) >(grep -v '\*' > suffix.txt)

      - name: Generate domain_regex.json
        run: |
          python3 -c "import json,re;out=[];\
def ok(d):\
 return d.startswith('*.') and d.count('*')==1 and '..' not in d[2:] and re.fullmatch(r'[a-zA-Z0-9-]+(\\.[a-zA-Z0-9-]+)+',d[2:]);\
[ out.append(r'^[^.]+\\.'+re.escape(d[2:])+r'$') for d in open('wildcard.txt') if ok(d.strip()) ];\
json.dump({'domain_regex':sorted(set(out))},open('domain_regex.json','w'),indent=2)"

      - name: Generate DnsFilter.json
        run: |
          jq -n \
            --rawfile suffix suffix.txt \
            --slurpfile regex domain_regex.json \
            '{
              version: 3,
              rules: [
                {
                  domain_suffix: ($suffix | split("\n") | map(select(length > 0))),
                  domain_regex: $regex[0].domain_regex
                }
              ]
            }' > DnsFilter.json

      - name: Compile to DnsFilter.srs
        run: |
          sing-box rule-set compile DnsFilter.json

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add DnsFilter.json DnsFilter.srs
          if ! git diff --cached --quiet; then
            git commit -m "Update DnsFilter"
            git push
          fi
