name: Update DnsFilter

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 0 点自动运行
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取仓库
      - uses: actions/checkout@v4

      # 2️⃣ 安装 sing-box
      - name: Install sing-box
        run: curl -fsSL https://sing-box.app/install.sh | sh

      # 3️⃣ 安装 Python requests
      - name: Install Python dependencies
        run: pip install requests

      # 4️⃣ 运行 Python 脚本生成 JSON 和 txt
      - name: Generate DnsFilter
        run: python3 scripts/generate_dnsfilter.py

      # 5️⃣ 编译生成 .srs 文件
      - name: Compile to DnsFilter.srs
        run: sing-box rule-set compile DnsFilter.json || echo "sing-box compile failed"

      # 6️⃣ 提交并推送到仓库
      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add DnsFilter.json DnsFilter.srs domain_regex.json wildcard.txt suffix.txt
          if ! git diff --cached --quiet
          then
            git commit -m "Update DnsFilter"
            git push
