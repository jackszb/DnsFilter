name: Update DnsFilter

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install sing-box
        run: curl -fsSL https://sing-box.app/install.sh | sh

      - name: Download DnsFilter list
        run: |
          curl -fsSL https://raw.githubusercontent.com/AdguardTeam/HostlistsRegistry/main/filters/general/filter_1_DnsFilter/filter.txt -o DnsFilter.txt

      - name: Extract domain_suffix and wildcard rules
        run: |
          set -e
          grep '^||' DnsFilter.txt | grep -vE '^(@@|^/)' | sed 's/^||//' | sed 's/\^.*$//' \
            | grep -vE '^([0-9]{1,3}\.){1,4}[0-9]{1,3}$' \
            | grep -vE '([^.]\.\.)' \
            | grep -vE '[/?=&]' \
            | grep -vE '\.$' \
            | sort -u \
            | tee >(grep '\*' > wildcard.txt) >(grep -v '\*' > suffix.txt)

      - name: Generate domain_regex.json
        run: |
          python3 - << 'EOF'
          import json
          import re
          def valid_domain(domain):
              if not domain:
                  return False
              if domain.endswith('.'):
                  return False
              if any(c in domain for c in '/?=&'):
                  return False
              labels = domain.split('.')
              for l in labels:
                  if not l:
                      return False
                  if l.startswith('-') or l.endswith('-'):
                      return False
                  if re.search(r'[^a-zA-Z0-9-]', l):
                      return False
              return True
          regex_list = []
          with open('wildcard.txt', 'r') as f:
              for line in f:
                  d = line.strip()
                  if not valid_domain(d):
                      continue
                  r = '^' + re.escape(d).replace(r'\*', r'[^.]+') + '$'
                  regex_list.append(r)
          with open('domain_regex.json', 'w') as f:
              json.dump({'domain_regex': regex_list}, f, indent=2)
          EOF

      - name: Generate DnsFilter.json
        run: |
          jq -n \
            --rawfile suffix suffix.txt \
            --slurpfile regex domain_regex.json \
            '{
              version: 3,
              rules: [
                {
                  domain_suffix: ($suffix | split("\n") | map(select(length > 0))),
                  domain_regex: $regex[0].domain_regex
                }
              ]
            }' > DnsFilter.json

      - name: Compile to DnsFilter.srs
        run: sing-box rule-set compile DnsFilter.json

      - name: Commit and push
        run: |
          set -e
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add DnsFilter.json DnsFilter.srs
          if ! git diff --cached --quiet; then
            git commit -m "Update DnsFilter"
            git push
          fi
