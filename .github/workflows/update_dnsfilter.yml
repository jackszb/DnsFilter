name: Update DnsFilter

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install sing-box
        run: curl -fsSL https://sing-box.app/install.sh | sh

      - name: Download DnsFilter list
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/AdguardTeam/HostlistsRegistry/main/filters/general/filter_1_DnsFilter/filter.txt \
            -o DnsFilter.txt

      - name: Extract and Generate domain_regex JSON
        run: |
          set -e
          grep '^||' DnsFilter.txt | grep -vE '^(@@|^/)' | sed 's/^||//' | sed 's/\^.*$//' \
            | grep -vE '^([0-9]{1,3}\.){1,4}([0-9]{1,3})?$' \
            | grep -vE '^([0-9]{1,3}\.){1,3}[0-9]{1,3}(\.\*)?(\.gif)?$' \
            | grep -vE '([^.]\.\.)' | sort -u | \
            tee >(grep '\*' > wildcard.txt) >(grep -v '\*' > suffix.txt)

          python3 - <<'EOF'
import json
import re

regex_list = []

def valid_wildcard(domain):
    if not domain.startswith('*.'):
        return False
    if domain.count('*') != 1:
        return False
    suffix = domain[2:]
    if '..' in suffix:
        return False
    if not re.fullmatch(r'[a-zA-Z0-9-]+(\.[a-zA-Z0-9-]+)+', suffix):
        return False
    return True

with open('wildcard.txt') as f:
    for line in f:
        d = line.strip()
        if valid_wildcard(d):
            suffix = d[2:]
            regex_list.append(r'^[^.]+\.' + re.escape(suffix) + r'$')

regex_list = sorted(set(regex_list))

with open('domain_regex.json', 'w') as f:
    json.dump({'domain_regex': regex_list}, f, indent=2)
EOF

      - name: Generate DnsFilter.json
        run: |
          jq -n \
            --rawfile suffix suffix.txt \
            --slurpfile regex domain_regex.json \
            '{
              version: 3,
              rules: [
                {
                  domain_suffix: ($suffix | split("\n") | map(select(length > 0))),
                  domain_regex: $regex[0].domain_regex
                }
              ]
            }' > DnsFilter.json

      - name: Compile to DnsFilter.srs
        run: |
          sing-box rule-set compile DnsFilter.json

      - name: Commit and push
        run: |
          set -e
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add DnsFilter.json DnsFilter.srs
          if ! git diff --cached --quiet; then
            git commit -m "Update DnsFilter"
            git push
          fi
