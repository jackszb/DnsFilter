name: Update DnsFilter-wildcard

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip; pip install requests

      - name: Generate DnsFilter-wildcard.json
        run: |
          python << 'EOF'
          import requests
          import json
          import re
          import fnmatch

          url = "https://raw.githubusercontent.com/jackszb/DnsFilter/main/wildcard.txt"

          # 排除模式（支持通配符）
          exclude_patterns = [
              "*.gif",
              "107.167.*.*",
              "121.204.246.*",
              "38.33.15.*",
              "67.21.92.*"
          ]

          def filter_domains(domains, patterns):
              compiled = [re.compile(fnmatch.translate(p)) for p in patterns]
              return [d for d in domains if not any(p.match(d) for p in compiled)]

          text = requests.get(url, timeout=30).text
          domains = set(line.strip() for line in text.splitlines() if line.strip())
          domains = filter_domains(domains, exclude_patterns)

          regex_list = []
          for d in domains:
              escaped = re.escape(d)
              escaped = escaped.replace(r"\*\.", r"([^.]+\.)*")
              escaped = escaped.replace(r"\*", r"[^.]*")
              regex_list.append(f"^{escaped}$")

          rule = {
              "version": 3,
              "rules": [
                  {"domain_regex": regex_list}
              ]
          }

          with open("DnsFilter-wildcard.json","w") as f:
              json.dump(rule,f,indent=2)
          EOF

      - name: Commit & Push
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add DnsFilter-wildcard.json
          git commit -m "Auto update DnsFilter-wildcard" || echo "No changes"
          git push
