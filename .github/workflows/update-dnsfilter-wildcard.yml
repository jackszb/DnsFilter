name: Update DnsFilter-wildcard

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip; pip install requests

      - name: Generate DnsFilter-wildcard.json
        run: |
          python << 'EOF'
          import requests
          import json
          import re

          url = "https://raw.githubusercontent.com/jackszb/DnsFilter/main/wildcard.txt"

          exclude_domains = {
              "107.167.16.*.gif",
              "107.167.22.*.gif",
              "121.204.246.*.gif",
              "38.33.15.*.gif",
              "67.21.92.*.gif"
          }

          text = requests.get(url, timeout=30).text
          domains = set(line.strip() for line in text.splitlines() if line.strip())
          domains = {d for d in domains if d not in exclude_domains}

          regex_list = []
          for d in domains:
              escaped = re.escape(d)
              escaped = escaped.replace(r"\*\.", r"([^.]+\.)*")
              escaped = escaped.replace(r"\*", r"[^.]*")
              regex_list.append(f"^{escaped}$")

          rule = {
              "version": 3,
              "rules": [
                  {"domain_regex": regex_list}
              ]
          }

          with open("DnsFilter-wildcard.json","w") as f:
              json.dump(rule,f,indent=2)
          EOF

      - name: Commit & Push
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add DnsFilter-wildcard.json
          git commit -m "Auto update DnsFilter-wildcard" || echo "No changes"
          git push
